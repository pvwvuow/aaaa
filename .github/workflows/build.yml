name: Build Poolyar

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install Dependencies
      run: npm install
    
    - name: Build Portable EXE
      run: npx electron-builder --win portable
    
    - name: Get version
      id: version
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: پول‌یار نسخه ${{ steps.version.outputs.VERSION }}
        body: |
          ## 📥 دانلود
          فایل exe را از پایین دانلود کنید.
          
          ## 💻 نصب
          فقط فایل را اجرا کنید - نیاز به نصب ندارد!
        files: dist/*.exe
        draft: false
        prerelease: false